services:
  # ─────────────────────────────────────────────────────────────────────────
  # Web — FastAPI serving the admin UI and API.
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: pandapower-backend
    runtime: python
    region: frankfurt
    plan: starter
    rootDir: apps/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn pandapower.main:app --host 0.0.0.0 --port $PORT --app-dir src
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      # Set the following secrets manually in Render Dashboard:
      # SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_JWT_SECRET
      # ANTHROPIC_API_KEY
      # RESEND_API_KEY
      # PIPEDRIVE_API_TOKEN, PIPEDRIVE_COMPANY_DOMAIN
      # CORS_ORIGINS (e.g. https://panda-power.vercel.app)
      # REDIS_URL (provisioned via Render Key-Value, see worker service)
    healthCheckPath: /health
    autoDeploy: true

  # ─────────────────────────────────────────────────────────────────────────
  # NOTE (Session 36): The separate Celery beat worker has been RETIRED.
  #
  # All recurring work — email ingest, CV parse, candidate creation, skill
  # normalization, scoring, Carmit job-routing / match-review / handoff-to-Tal,
  # the pipeline watchdog, and Pipedrive sync — now runs inside the always-on
  # web service via the in-process scheduler (apps/backend/src/pandapower/
  # main.py :: _pipeline_scheduler_loop). Render keeps the web service alive via
  # the /health check, so the automation runs as long as the API is up.
  #
  # Why removed: the old worker was a silent single point of failure (if it
  # crashed or REDIS_URL was missing, the matching pipeline stopped while email
  # intake kept going — invisibly). Consolidating onto the web service removes
  # that failure mode and the Redis dependency, and prevents double-execution of
  # the non-idempotent matching tasks.
  #
  # Per-task health is now persisted to the scheduler_heartbeats table and
  # surfaced at GET /admin/system/heartbeat (+ the "ניטור מערכת" dashboard).
  #
  # If you ever need Celery again for ad-hoc work, you can run a worker, but do
  # NOT set ENABLE_CELERY_BEAT=true while the in-process scheduler is running.
  # ─────────────────────────────────────────────────────────────────────────
